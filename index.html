<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutlu Yıllar Sahra! 🌾</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <style>
        /* --- GENEL AYARLAR & STİLLER --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #5c8e32; /* Stardew Valley Çim Yeşili */
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.15) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.15) 2px, transparent 2px);
            background-size: 4px 4px; /* Piksel dokusu efekti */
            font-family: 'VT323', monospace;
            color: #4a2a06;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        /* --- BAŞLIK ALANI (HERO) --- */
        header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(to bottom, #2c5c84, #5c8e32); /* Gece gökyüzünden çimene geçiş */
            border-bottom: 8px solid #f3bc64;
            box-shadow: 0 8px 0 #8f5613;
            color: #fff;
            text-shadow: 3px 3px 0px #000;
        }

        header h1 {
            font-size: 4.5rem;
            margin-bottom: 10px;
            animation: bounce 2s infinite alternate;
        }

        header p {
            font-size: 2rem;
            color: #f3bc64;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        /* --- ANA İÇERİK ALANI --- */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .section-title {
            text-align: center;
            font-size: 3rem;
            margin: 40px 0 20px 0;
            color: #fff;
            text-shadow: 3px 3px 0px #3c2104;
        }

        /* --- STARDEW DIALOG KUTUSU (NOTLAR) --- */
        .dialog-container {
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s ease-out;
            margin-bottom: 40px;
        }

        /* Kaydırınca görünür olma sınıfı (JS ile eklenecek) */
        .dialog-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .stardew-box {
            background-color: #f1d399; /* Klasik Stardew diyalog rengi */
            border: 6px solid #f3bc64;
            outline: 6px solid #4a2a06;
            box-shadow: inset -4px -4px 0px #b5894b, inset 4px 4px 0px #fff, 0 10px 0px rgba(0,0,0,0.2);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            image-rendering: pixelated;
        }

        /* Avatar / Portre Alanı */
        .portrait-area {
            width: 100px;
            height: 100px;
            background-color: #9c7c4c;
            border: 4px solid #4a2a06;
            box-shadow: inset 4px 4px 0px rgba(0,0,0,0.3);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f1d399;
            font-size: 1.2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .portrait-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Diyalog Metin Alanı */
        .dialog-text {
            flex-grow: 1;
        }

        .dialog-text h3 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            color: #4a2a06;
            border-bottom: 2px dashed #b5894b;
        }

        .dialog-text p {
            font-size: 1.6rem;
            line-height: 1.3;
            color: #311a02;
        }

        /* --- FOTOĞRAF DUVARI VE GALERİ --- */
        .gallery-section {
            background-color: #f1d399;
            border: 6px solid #f3bc64;
            outline: 6px solid #4a2a06;
            box-shadow: inset -4px -4px 0px #b5894b, inset 4px 4px 0px #fff;
            padding: 30px 20px;
            text-align: center;
            margin-top: 60px;
        }

        /* Retro Buton Tasarımı */
        .stardew-btn {
            display: inline-block;
            background-color: #b5894b;
            color: #fff;
            border: 4px solid #4a2a06;
            padding: 10px 20px;
            font-family: 'VT323', monospace;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0
